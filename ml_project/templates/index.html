<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Muscle Recovery Predictor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #ccc;
}

.input-box {
    position: relative;
    margin: 20px 0;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: transparent;
    border-bottom: 2px solid #aaa;
    color: white;
    font-size: 16px;
}

.input-box label {
    position: absolute;
    left: 0;
    top: 10px;
    color: #aaa;
    transition: 0.3s;
}

.input-box input:focus ~ label,
.input-box input:valid ~ label {
    top: -10px;
    font-size: 12px;
    color: #00ffcc;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}
</style>

</head>

<body>

<div class="container">
    <h1>💪 Muscle Recovery</h1>
    <p>AI-based Recovery Predictor</p>

    <div class="input-box">
        <input type="number" id="sleep" required>
        <label>Sleep Hours</label>
    </div>

    <div class="input-box">
        <input type="number" id="protein" required>
        <label>Protein Intake (g)</label>
    </div>

    <div class="input-box">
        <input type="number" id="intensity" required>
        <label>Workout Intensity (1-10)</label>
    </div>

    <button onclick="predict()">Predict</button>

    <div class="result" id="result"></div>
</div>

<script>
function predict() {
    let sleep = document.getElementById("sleep").value;
    let protein = document.getElementById("protein").value;
    let intensity = document.getElementById("intensity").value;

    if (!sleep || !protein || !intensity) {
        document.getElementById("result").innerHTML = "⚠️ Fill all fields";
        return;
    }

    // Simple logic (demo prediction)
    let score = (sleep * 2) + (protein * 0.5) - (intensity * 2);

    let result = "";

    if (score > 20) {
        result = "🟢 Good Recovery";
    } else if (score > 10) {
        result = "🟡 Moderate Recovery";
    } else {
        result = "🔴 Poor Recovery";
    }

    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
